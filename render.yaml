services:
  - type: web
    name: coughtb
    runtime: docker
    repo: https://github.com/KongGithubDev/Cough_TB.git
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
